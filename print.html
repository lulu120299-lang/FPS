<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FPS — Aperçu PDF</title>
<link rel="stylesheet" href="carnet-theme.css">
<style>
  body{
    margin:0;
    background:var(--kraft);
  }
  .toolbar{
    position:sticky; top:0; z-index:10;
    background:var(--kraft); border-bottom:2px solid var(--ink);
    padding:calc(env(safe-area-inset-top) + 12px) 14px 12px;
    display:flex; align-items:center; gap:10px;
  }
  .back{
    background:none;border:none;color:var(--ink);font-size:24px;font-weight:700;
    width:34px;height:34px;display:flex;align-items:center;justify-content:center;
    cursor:pointer; flex:none; font-family:var(--font-hand);
  }
  .toolbar .ttitle{
    font-family:var(--font-stamp); font-size:14px; flex:1; color:var(--ink);
  }
  .toolbar button.print{
    background:var(--stamp-red); color:#fff; border:2px solid var(--ink); border-radius:3px;
    padding:8px 14px; font-size:13px; font-weight:700; cursor:pointer; font-family:var(--font-hand);
    box-shadow:2px 2px 0 var(--ink);
  }
  .toolbar button.print:active{box-shadow:none; transform:translate(1px,1px);}

  /* La page imprimable reste neutre (papier blanc, police standard) car c'est le document final exporté */
  .page{
    max-width:780px;
    margin:18px auto;
    background:#fff;
    padding:28px 30px;
    border-radius:8px;
    box-shadow:0 2px 12px rgba(43,53,53,.08);
    font-family:-apple-system,'Inter',system-ui,sans-serif;
    color:#2b3535;
  }

  /* Bandeau */
  .pv-bandeau{
    border-radius:8px;
    padding:14px 18px;
    color:#fff;
    margin-bottom:14px;
  }
  .pv-bandeau .t1{font-weight:700; font-size:18px; margin:0 0 4px;}
  .pv-bandeau .t2{font-size:12px; opacity:.9;}

  /* Objectif */
  .pv-objectif{
    border-left:4px solid var(--corail);
    background:var(--corail-soft);
    border-radius:0 8px 8px 0;
    padding:12px 16px;
    font-style:italic;
    font-size:13px;
    margin-bottom:14px;
  }

  /* AFLP */
  .pv-aflp{
    display:grid; gap:1px;
    margin-bottom:14px;
    border:1px solid var(--line);
  }
  .pv-aflp-col{
    padding:9px 10px; color:#fff;
    min-height:50px;
  }
  .pv-aflp-col .lbl{font-weight:700; font-size:11px; margin-bottom:4px; text-transform:uppercase; letter-spacing:.03em;}
  .pv-aflp-col .note{font-family:'JetBrains Mono','SF Mono',monospace; font-size:14px; font-weight:700;}

  /* Texte riche */
  .pv-texte{
    font-size:13px; line-height:1.7; margin-bottom:14px;
  }
  .pv-texte mark{background:#fef3a0; padding:0 1px; border-radius:2px;}

  /* Encadré */
  .pv-encadre{
    padding:11px 15px; font-size:13px; margin-bottom:14px;
    border:1px solid var(--line);
  }
  .pv-encadre strong{display:block; margin-bottom:4px;}

  /* Tableau colonnes */
  .pv-tableau{
    display:grid; gap:1px; margin-bottom:14px;
    border:1px solid var(--line);
  }
  .pv-tableau-col{background:#fff;}
  .pv-tableau-col .h{padding:6px 10px; font-weight:700; font-size:11.5px;}
  .pv-tableau-col .note{
    font-family:'JetBrains Mono','SF Mono',monospace; font-size:18px; font-weight:700;
    color:var(--corail); padding:8px 10px 0; text-align:center;
  }
  .pv-tableau-col .b{padding:6px 10px 10px; font-size:12px; line-height:1.5; min-height:24px;}

  /* Sécurité */
  .pv-securite{
    border-radius:8px; padding:12px 16px; font-size:13px; margin-bottom:14px;
    background:#fbe4e1; border:1px solid var(--corail); color:#7a3325;
  }
  .pv-securite strong{margin-right:4px;}

  /* Image */
  .pv-image{margin-bottom:14px;}
  .pv-image img{width:100%; border-radius:6px; display:block;}
  .pv-image .leg{font-size:11px; color:var(--slate-light); text-align:center; margin-top:4px;}

  .pv-footer{
    text-align:center; font-size:10px; color:var(--slate-light);
    margin-top:24px; padding-top:10px; border-top:1px solid var(--line);
  }

  @media print{
    .toolbar{display:none;}
    body{background:#fff;}
    .page{box-shadow:none; margin:0; max-width:100%; padding:0;}
    @page{ margin: 14mm; }
  }

  .empty-state{
    text-align:center; padding:60px 20px; color:var(--slate-light);
  }
</style>
</head>
<body>
<div class="toolbar">
  <button class="back" onclick="goBack()">‹</button>
  <div class="ttitle">Aperçu PDF</div>
  <button class="print" onclick="window.print()">Imprimer / PDF</button>
</div>

<div class="page" id="page">
  <div class="empty-state">Chargement…</div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="print.js"></script>
</body>
</html>
