<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Éditeur de schéma</title>
<meta name="theme-color" content="#d9c9a8">
<link rel="stylesheet" href="carnet-theme.css">
<style>
  html,body{
    margin:0; height:100%;
    overflow:hidden;
  }
  header{
    background:var(--kraft);
    border-bottom:2px solid var(--ink);
    padding:calc(env(safe-area-inset-top) + 12px) 14px 12px;
    display:flex; align-items:center; gap:10px;
  }
  .back{
    background:none;border:none;color:var(--ink);font-size:24px;font-weight:700;
    width:34px;height:34px;display:flex;align-items:center;justify-content:center;
    cursor:pointer; flex:none; font-family:var(--font-hand);
  }
  .htitle{
    font-family:var(--font-stamp);
    font-size:15px;
    flex:1;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    color:var(--ink);
  }
  .save-status{
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--stamp-green);
    flex:none;
  }
  .header-btn{
    background:var(--card); border:1.5px solid var(--ink);
    color:var(--ink); border-radius:3px;
    font-size:11px; font-family:var(--font-mono);
    padding:6px 10px; cursor:pointer; flex:none;
  }

  /* Barre d'outils */
  .toolbar{
    display:flex; gap:6px; overflow-x:auto;
    padding:10px 10px;
    background:var(--card);
    border-bottom:2px solid var(--ink);
    -ms-overflow-style:none; scrollbar-width:none;
    align-items:center;
  }
  .toolbar::-webkit-scrollbar{display:none;}
  .tool{
    flex:none;
    width:42px; height:42px;
    border-radius:3px;
    border:1.5px solid var(--ink);
    background:#fffdf6;
    color:var(--ink);
    font-size:17px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
  }
  .tool.active{
    background:var(--ink); border-color:var(--ink); color:var(--card);
  }
  .tool-sep{flex:none; width:1px; background:var(--line); margin:0 4px; height:28px;}
  .color-swatch{
    flex:none;
    width:42px; height:42px;
    border-radius:3px;
    border:2px solid var(--ink);
    padding:0;
    cursor:pointer;
  }
  .color-swatch.active{border-color:var(--ink);}

  /* Épaisseur pinceau */
  .width-picker{
    display:flex; gap:4px; align-items:center; flex:none;
  }
  .width-btn{
    width:36px; height:42px;
    border-radius:3px;
    border:1.5px solid var(--ink);
    background:#fffdf6;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
  }
  .width-btn.active{border-color:var(--ink); background:var(--kraft-dark);}
  .width-btn .dot{border-radius:50%; background:var(--ink);}

  /* Zone canvas */
  .canvas-wrap{
    position:absolute; top:0; left:0; right:0; bottom:60px;
    margin-top:118px; /* header + toolbar */
    overflow:auto;
    background:
      linear-gradient(var(--line) 1px, transparent 1px) 0 0 / 24px 24px,
      linear-gradient(90deg, var(--line) 1px, transparent 1px) 0 0 / 24px 24px,
      var(--kraft);
  }
  canvas{
    display:block;
    touch-action:none;
    background:transparent;
    transform-origin:0 0;
  }

  .actions{
    position:fixed; bottom:0; left:0; right:0;
    background:var(--kraft);
    border-top:2px solid var(--ink);
    padding:10px 14px calc(10px + env(safe-area-inset-bottom));
    display:flex; gap:10px;
    z-index:20;
  }

  /* Panneau terrains */
  .field-panel{
    position:fixed; left:0; right:0; bottom:64px;
    background:var(--card);
    border-top:2px solid var(--ink);
    box-shadow:0 -4px 16px rgba(58,47,31,.15);
    padding:12px 12px calc(12px + env(safe-area-inset-bottom));
    transform:translateY(100%);
    transition:transform .2s ease;
    z-index:15;
    max-height:45vh;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
  }
  .field-panel.open{transform:translateY(0);}
  .field-panel h4{
    font-family:var(--font-stamp); font-size:14px; color:var(--ink); margin:0 0 10px;
  }
  .field-grid{
    display:grid; grid-template-columns:repeat(auto-fill, minmax(96px,1fr)); gap:10px;
  }
  .field-item{
    border:1.5px solid var(--ink); border-radius:3px;
    padding:8px; text-align:center; cursor:pointer;
    background:#fffdf6;
  }
  .field-item:active{border-color:var(--stamp-red);}
  .field-item svg{width:100%; height:48px; display:block; margin-bottom:6px;}
  .field-item span{font-size:11px; font-weight:700; font-family:var(--font-hand);}
</style>
</head>
<body>
<header>
  <button class="back" onclick="goBack()">‹</button>
  <div class="htitle" id="pageTitle">Éditeur de schéma</div>
  <button class="header-btn" onclick="renameSchema()" title="Renommer">✎ Nom</button>
  <div class="save-status" id="saveStatus"></div>
</header>

<div class="toolbar" id="toolbar">
  <button class="tool active" data-tool="select" title="Sélection">▣</button>
  <button class="tool" data-tool="pen" title="Dessin main levée">✎</button>
  <button class="tool" data-tool="rect" title="Rectangle">▭</button>
  <button class="tool" data-tool="circle" title="Cercle / plot">○</button>
  <button class="tool" data-tool="arrow" title="Flèche">→</button>
  <button class="tool" data-tool="line" title="Ligne">╱</button>
  <button class="tool" data-tool="text" title="Texte">T</button>
  <div class="tool-sep"></div>
  <input type="color" class="color-swatch active" id="colorPicker" value="#3a4a4a" title="Couleur">
  <div class="width-picker" id="widthPicker">
    <button class="width-btn" data-width="2"><span class="dot" style="width:4px;height:4px"></span></button>
    <button class="width-btn active" data-width="3"><span class="dot" style="width:7px;height:7px"></span></button>
    <button class="width-btn" data-width="6"><span class="dot" style="width:11px;height:11px"></span></button>
    <button class="width-btn" data-width="10"><span class="dot" style="width:16px;height:16px"></span></button>
  </div>
  <div class="tool-sep"></div>
  <button class="tool" data-tool="field" title="Terrains">⚽︎</button>
  <button class="tool" data-tool="undo" title="Annuler">↺</button>
  <button class="tool" data-tool="delete" title="Supprimer la sélection">⌫</button>
  <button class="tool" data-tool="clear" title="Tout effacer">⨯</button>
  <div class="tool-sep"></div>
  <button class="tool" data-tool="zoom-out" title="Zoom -">−</button>
  <button class="tool" id="zoomLabel" title="Réinitialiser le zoom" data-tool="zoom-reset" style="font-size:11px;font-family:var(--font-mono)">100%</button>
  <button class="tool" data-tool="zoom-in" title="Zoom +">+</button>
</div>

<div class="field-panel" id="fieldPanel">
  <h4>Ajouter un terrain</h4>
  <div class="field-grid" id="fieldGrid"></div>
</div>

<div class="canvas-wrap">
  <canvas id="canvas" width="1200" height="900"></canvas>
</div>

<div class="actions">
  <button class="btn-secondary" onclick="exportImage()">Exporter en image</button>
  <button class="btn-primary" onclick="saveSchema()">Enregistrer dans la FPS</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="terrains.js"></script>
<script src="schema.js"></script>
</body>
</html>
