<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Grille de classe</title>
<meta name="theme-color" content="#3a4a4a">
<style>
  :root{
    --ink:#2b3535;
    --slate:#3a4a4a;
    --slate-light:#5a6e6e;
    --sage:#8aa399;
    --sage-pale:#e7eee9;
    --paper:#f6f5f1;
    --paper-card:#ffffff;
    --corail:#e0654a;
    --corail-soft:#f7ddd5;
    --line:#dcdfd9;
    --radius:14px;
    --shadow:0 1px 2px rgba(43,53,53,.06), 0 4px 16px rgba(43,53,53,.06);
    --font-display:'Fjalla One','Arial Narrow',sans-serif;
    --font-body:-apple-system,'Inter',system-ui,sans-serif;
    --font-mono:'JetBrains Mono','SF Mono',monospace;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{
    margin:0;
    font-family:var(--font-body);
    background:var(--paper);
    color:var(--ink);
    min-height:100vh;
  }
  header{
    position:sticky; top:0; z-index:20;
    background:var(--slate);
    color:#fff;
    padding:calc(env(safe-area-inset-top) + 12px) 14px 12px;
    display:flex; align-items:center; gap:10px;
  }
  .back{
    background:none;border:none;color:#fff;font-size:22px;
    width:34px;height:34px;display:flex;align-items:center;justify-content:center;
    cursor:pointer; flex:none;
  }
  .htitle{
    font-family:var(--font-display);
    text-transform:uppercase;
    letter-spacing:.05em;
    font-size:16px;
    flex:1;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .save-status{
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--sage);
    flex:none;
  }

  main{padding:12px;max-width:1100px;margin:0 auto;}

  /* Bandeau import / pool */
  .toolbar{
    display:flex; gap:10px; align-items:center;
    margin-bottom:12px;
    flex-wrap:wrap;
  }
  .btn-import{
    background:var(--paper-card);
    border:1px solid var(--line);
    border-radius:10px;
    padding:9px 14px;
    font-size:13px; font-weight:600;
    color:var(--slate);
    cursor:pointer;
    display:flex; align-items:center; gap:6px;
  }
  .btn-clear{
    background:none;
    border:none;
    color:var(--slate-light);
    font-size:12px;
    font-family:var(--font-mono);
    cursor:pointer;
    text-decoration:underline;
  }
  .mode-toggle{
    margin-left:auto;
    display:flex; gap:6px;
  }
  .mode-toggle button{
    font-family:var(--font-mono); font-size:11px; letter-spacing:.04em;
    text-transform:uppercase;
    padding:7px 12px; border-radius:999px;
    border:1px solid var(--line);
    background:var(--paper-card); color:var(--slate-light);
    cursor:pointer;
  }
  .mode-toggle button.active{
    background:var(--slate); border-color:var(--slate); color:#fff;
  }

  /* Pool d'élèves non placés */
  .pool{
    background:var(--paper-card);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:12px;
    margin-bottom:14px;
  }
  .pool h3{
    font-family:var(--font-display);
    text-transform:uppercase; letter-spacing:.06em;
    font-size:12px; color:var(--slate-light);
    margin:0 0 10px;
  }
  .pool-cards{
    display:flex; flex-wrap:wrap; gap:8px;
    min-height:48px;
  }

  /* Couloirs / colonnes de niveaux */
  .lanes{
    display:flex; gap:10px; overflow-x:auto;
    padding-bottom:8px;
    -ms-overflow-style:none; scrollbar-width:none;
  }
  .lanes::-webkit-scrollbar{display:none;}
  .lane{
    flex:1 0 220px;
    min-width:220px;
    background:var(--paper-card);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    display:flex; flex-direction:column;
    max-height:calc(100vh - 240px);
  }
  .lane-head{
    padding:12px 14px 10px;
    border-bottom:3px solid var(--line);
    flex:none;
  }
  .lane-head .lname{
    font-weight:700; font-size:14px;
    margin:0 0 2px;
  }
  .lane-head .lcount{
    font-family:var(--font-mono); font-size:11px;
    color:var(--slate-light);
  }
  .lane-body{
    padding:10px;
    overflow-y:auto;
    flex:1;
    display:flex; flex-direction:column; gap:8px;
    min-height:80px;
  }
  .lane-body.dragover{
    background:var(--sage-pale);
  }

  /* Carte élève */
  .eleve-card{
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:10px;
    padding:9px 11px;
    font-size:13px;
    font-weight:600;
    cursor:grab;
    display:flex; align-items:center; gap:8px;
    user-select:none;
    -webkit-user-select:none;
  }
  .eleve-card .initiale{
    width:24px;height:24px;border-radius:50%;
    background:var(--sage-pale); color:var(--slate);
    display:flex; align-items:center; justify-content:center;
    font-family:var(--font-mono); font-size:11px; flex:none;
  }
  .eleve-card.dragging{opacity:.4;}
  .eleve-card .nom{overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}

  /* Mode élève (autoévaluation) */
  .student-pick{
    display:none;
    margin-bottom:12px;
  }
  .student-pick.show{display:block;}
  .student-pick select{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid var(--line);
    font-size:15px;
    background:var(--paper-card);
  }

  .empty-state{
    text-align:center;
    padding:60px 20px;
    color:var(--slate-light);
  }
  .empty-state .sym{
    font-family:var(--font-display);
    font-size:48px;
    color:var(--sage);
    margin-bottom:8px;
  }
  .empty-state h2{
    font-family:var(--font-display);
    text-transform:uppercase; letter-spacing:.06em;
    font-size:17px; color:var(--ink); margin:0 0 6px;
  }
  .empty-state p{margin:0; font-size:14px; line-height:1.5;}

  @media (max-width: 640px){
    .lane{flex:1 0 200px; min-width:200px;}
  }
</style>
</head>
<body>
<header>
  <button class="back" onclick="goBack()">‹</button>
  <div class="htitle" id="pageTitle">Grille de classe</div>
  <div class="save-status" id="saveStatus"></div>
</header>

<main>
  <div class="toolbar">
    <button class="btn-import" onclick="document.getElementById('xlsxInput').click()">⇡ Importer une classe (.xlsx)</button>
    <button class="btn-clear" id="clearBtn" style="display:none" onclick="resetGrille()">Réinitialiser la répartition</button>
    <div class="mode-toggle" id="modeToggle">
      <button class="active" data-mode="prof">Prof</button>
      <button data-mode="eleve">Élève</button>
    </div>
  </div>
  <input type="file" id="xlsxInput" accept=".xlsx" style="display:none">

  <div class="student-pick" id="studentPick">
    <select id="studentSelect">
      <option value="">— Choisis ton prénom —</option>
    </select>
  </div>

  <div id="content">
    <div class="empty-state">
      <div class="sym">CLS</div>
      <h2>Aucune classe importée</h2>
      <p>Importe un export Ecole Direct (.xlsx) pour faire apparaître<br>la liste des élèves à répartir dans les niveaux.</p>
    </div>
  </div>

  <div class="pool" id="poolSection" style="display:none">
    <h3>Non répartis</h3>
    <div class="pool-cards" id="poolCards"></div>
  </div>

  <div class="lanes" id="lanes" style="display:none"></div>
</main>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="firebase-config.js"></script>
<script src="grille.js"></script>
</body>
</html>
