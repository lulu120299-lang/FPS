<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Grille de classe</title>
<meta name="theme-color" content="#d9c9a8">
<link rel="stylesheet" href="carnet-theme.css">
<style>
  main{padding:12px;max-width:1100px;margin:0 auto;}

  /* Bandeau import / pool */
  .toolbar{
    display:flex; gap:10px; align-items:center;
    margin-bottom:12px;
    flex-wrap:wrap;
  }
  .btn-import{
    background:#fffdf6;
    border:1.5px solid var(--ink);
    border-radius:3px;
    padding:9px 14px;
    font-size:13px; font-weight:700;
    color:var(--ink);
    cursor:pointer;
    display:flex; align-items:center; gap:6px;
    font-family:var(--font-hand);
  }
  .btn-clear{
    background:none;
    border:none;
    color:var(--ink-soft);
    font-size:12px;
    font-family:var(--font-mono);
    cursor:pointer;
    text-decoration:underline;
  }
  .mode-toggle{
    margin-left:auto;
    display:flex; gap:1px;
    border:1.5px solid var(--ink);
    border-radius:3px;
    overflow:hidden;
  }
  .mode-toggle button{
    font-family:var(--font-mono); font-size:11px; letter-spacing:.04em;
    text-transform:uppercase;
    padding:7px 12px;
    border:none;
    background:#fffdf6; color:var(--ink-soft);
    cursor:pointer;
  }
  .mode-toggle button.active{
    background:var(--ink); color:var(--card);
  }

  /* Pool d'élèves non placés */
  .pool{
    background:var(--card);
    border:2px solid var(--ink);
    border-radius:4px;
    box-shadow:3px 4px 0 rgba(58,47,31,.2);
    padding:12px;
    margin-bottom:14px;
  }
  .pool h3{
    font-family:var(--font-stamp);
    font-size:13px; color:var(--ink-soft);
    margin:0 0 10px;
  }
  .pool-cards{
    display:flex; flex-wrap:wrap; gap:8px;
    min-height:48px;
  }

  /* Couloirs / colonnes de niveaux */
  .lanes{
    display:flex; gap:10px; overflow-x:auto;
    padding-bottom:8px;
    -ms-overflow-style:none; scrollbar-width:none;
  }
  .lanes::-webkit-scrollbar{display:none;}
  .lane{
    flex:1 0 220px;
    min-width:220px;
    background:var(--card);
    border:2px solid var(--ink);
    border-radius:4px;
    box-shadow:3px 4px 0 rgba(58,47,31,.2);
    display:flex; flex-direction:column;
    max-height:calc(100vh - 240px);
  }
  .lane-head{
    padding:12px 14px 10px;
    border-bottom:3px solid var(--line);
    flex:none;
  }
  .lane-head .lname{
    font-family:var(--font-stamp);
    font-size:14px;
    margin:0 0 2px;
  }
  .lane-head .lcount{
    font-family:var(--font-mono); font-size:11px;
    color:var(--ink-soft);
  }
  .lane-body{
    padding:10px;
    overflow-y:auto;
    flex:1;
    display:flex; flex-direction:column; gap:8px;
    min-height:80px;
  }
  .lane-body.dragover{
    background:var(--kraft-dark);
  }

  /* Carte élève */
  .eleve-card{
    background:#fffdf6;
    border:1.5px solid var(--ink);
    border-radius:3px;
    padding:9px 11px;
    font-size:13px;
    font-weight:700;
    font-family:var(--font-hand);
    cursor:grab;
    display:flex; align-items:center; gap:8px;
    user-select:none;
    -webkit-user-select:none;
  }
  .eleve-card .initiale{
    width:24px;height:24px;border-radius:50%;
    background:var(--kraft); color:var(--ink);
    display:flex; align-items:center; justify-content:center;
    font-family:var(--font-mono); font-size:11px; flex:none;
    border:1px solid var(--ink);
  }
  .eleve-card.dragging{opacity:.4;}
  .eleve-card .nom{overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}

  /* Mode élève (autoévaluation) */
  .student-pick{
    display:none;
    margin-bottom:12px;
  }
  .student-pick.show{display:block;}
  .student-pick select{
    width:100%;
    padding:12px;
    border-radius:3px;
    border:1.5px solid var(--ink);
    font-size:15px;
    background:#fffdf6;
    font-family:var(--font-hand);
  }

  .empty-state{
    text-align:center;
    padding:60px 20px;
    color:var(--ink-soft);
  }
  .empty-state .sym{
    font-family:var(--font-stamp);
    font-size:38px;
    color:var(--ink-soft);
    margin-bottom:8px;
  }
  .empty-state h2{
    font-family:var(--font-stamp);
    font-size:18px; color:var(--ink); margin:0 0 6px;
  }
  .empty-state p{margin:0; font-size:14px; line-height:1.5; font-family:var(--font-hand);}

  @media (max-width: 640px){
    .lane{flex:1 0 200px; min-width:200px;}
  }
</style>
</head>
<body>
<header class="app-header">
  <button class="back" onclick="goBack()">‹</button>
  <div class="htitle" id="pageTitle">Grille de classe</div>
  <div class="save-status" id="saveStatus"></div>
</header>

<main>
  <div class="toolbar">
    <button class="btn-import" onclick="document.getElementById('xlsxInput').click()">⇡ Importer une classe (.xlsx)</button>
    <button class="btn-clear" id="clearBtn" style="display:none" onclick="resetGrille()">Réinitialiser la répartition</button>
    <div class="mode-toggle" id="modeToggle">
      <button class="active" data-mode="prof">Prof</button>
      <button data-mode="eleve">Élève</button>
    </div>
  </div>
  <input type="file" id="xlsxInput" accept=".xlsx" style="display:none">

  <div class="student-pick" id="studentPick">
    <select id="studentSelect">
      <option value="">— Choisis ton prénom —</option>
    </select>
  </div>

  <div id="content">
    <div class="empty-state">
      <div class="sym">📋</div>
      <h2>Aucune classe importée</h2>
      <p>Importe un export Ecole Direct (.xlsx) pour faire apparaître<br>la liste des élèves à répartir dans les niveaux.</p>
    </div>
  </div>

  <div class="pool" id="poolSection" style="display:none">
    <h3>Non répartis</h3>
    <div class="pool-cards" id="poolCards"></div>
  </div>

  <div class="lanes" id="lanes" style="display:none"></div>
</main>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="firebase-config.js"></script>
<script src="grille.js"></script>
</body>
</html>
