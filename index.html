<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>FPS Manager</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f0f0f">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="stylesheet" href="carnet-theme.css">
<style>
  body{padding-bottom:env(safe-area-inset-bottom);}

  header{
    padding:calc(env(safe-area-inset-top) + 20px) 20px 16px;
    background:var(--bg);
    border-bottom:1px solid var(--line);
    display:flex; align-items:center; justify-content:space-between;
  }
  .brand{
    font-size:22px; font-weight:700;
    color:var(--ink);
    letter-spacing:-.02em;
  }
  .brand .sub{
    display:block;
    font-family:var(--font-mono);
    font-size:10px;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin-top:2px;
    font-weight:400;
  }
  .new-btn{
    display:inline-flex; align-items:center; gap:8px;
    background:var(--accent-blue);
    border:none;
    color:#fff;
    font-family:var(--font-body); font-weight:600; font-size:14px;
    padding:10px 18px;
    border-radius:10px;
    cursor:pointer;
  }
  .new-btn:active{opacity:.8;}

  main{max-width:1200px; margin:0 auto; padding:24px 24px 40px;}

  /* Archivées */
  .archive-toggle{
    font-family:var(--font-mono); font-size:11px; color:var(--ink-soft);
    text-align:center; margin-bottom:10px; cursor:pointer;
    letter-spacing:.04em; text-transform:uppercase;
  }
  .archive-list{display:none; margin-bottom:24px;}
  .archive-list.open{display:block;}

  /* Tableau niveau scolaire */
  .level-board{margin-bottom:40px;}
  .level-head{
    display:flex; align-items:center; gap:10px;
    margin-bottom:14px;
  }
  .level-head h2{
    font-size:12px; font-weight:600;
    color:var(--ink-soft);
    margin:0;
    text-transform:uppercase;
    letter-spacing:.1em;
    font-family:var(--font-mono);
  }
  .level-head .count{
    background:var(--bg-card2);
    color:var(--ink-soft);
    font-family:var(--font-mono); font-size:10px;
    padding:2px 8px; border-radius:20px;
    font-weight:500;
  }
  .level-head .divider{
    flex:1; height:1px; background:var(--line);
  }

  .columns{
    display:grid;
    grid-template-columns:repeat(5, 1fr);
    gap:14px;
  }

  .column{
    background:var(--bg-card);
    border:1px solid var(--line);
    border-radius:14px;
    display:flex; flex-direction:column;
    min-height:120px;
    overflow:hidden;
  }
  .column.dragover{
    border-color:var(--accent-blue);
    background:rgba(59,130,246,.06);
  }
  .column-head{
    padding:10px 14px 9px;
    font-family:var(--font-mono);
    font-size:10px; font-weight:700;
    text-transform:uppercase; letter-spacing:.06em;
    color:var(--ink-soft);
    display:flex; justify-content:space-between; align-items:center;
    flex:none;
    border-bottom:1px solid var(--line);
  }
  .column-head .ca-badge{
    background:var(--bg-card2);
    color:var(--accent-blue);
    padding:3px 8px; border-radius:6px;
    font-size:10px; font-weight:700;
  }
  .column-head .ca-count{
    color:var(--ink-muted); font-size:10px;
  }
  .column-body{
    padding:10px; flex:1;
    display:flex; flex-direction:column; gap:10px;
    min-height:80px;
  }
  .column-empty{
    font-size:11px; color:var(--ink-muted);
    text-align:center; padding:20px 6px;
    font-family:var(--font-mono);
  }

  /* Carte FPS */
  .card{
    background:var(--bg-card2);
    border:1px solid var(--line);
    border-radius:12px;
    padding:14px 14px 12px;
    position:relative;
    cursor:grab;
    user-select:none;
    -webkit-user-select:none;
    transition:border-color .15s;
  }
  .card:hover{border-color:#404040;}
  .card.dragging{opacity:.35;}
  .card:active{cursor:grabbing;}

  .card-top{display:flex; align-items:center; gap:12px; margin-bottom:10px;}
  .card-icon{
    width:42px; height:42px; flex:none;
    border-radius:12px;
    display:flex; align-items:center; justify-content:center;
    font-size:22px;
    background:var(--bg-input);
  }
  .card-title{
    font-size:14px; font-weight:600;
    line-height:1.35;
    overflow:hidden; text-overflow:ellipsis; display:-webkit-box;
    -webkit-line-clamp:2; -webkit-box-orient:vertical;
    color:var(--ink);
  }
  .card-meta{
    font-family:var(--font-mono); font-size:10.5px; color:var(--ink-soft);
    margin-bottom:10px; letter-spacing:.02em;
  }
  .pegs{display:flex; gap:5px; align-items:center; min-height:10px;}
  .peg{width:9px; height:9px; border-radius:50%; flex:none;}

  .card-actions{
    position:absolute; top:10px; right:10px;
  }
  .card-actions button{
    background:none; border:none; font-size:15px; color:var(--ink-muted);
    cursor:pointer; width:26px; height:26px; border-radius:6px;
    display:flex; align-items:center; justify-content:center;
  }
  .card-actions button:hover{background:rgba(255,255,255,.06); color:var(--accent-red);}

  .empty-note{
    text-align:center; padding:60px 20px;
    color:var(--ink-muted); font-size:14px;
  }
  .empty-note .sym{ font-size:40px; margin-bottom:12px; }
  .empty-note p{ font-size:13px; margin-top:8px; color:var(--ink-muted); }

  @media (max-width:900px){
    .columns{grid-template-columns:repeat(3,1fr);}
  }
  @media (max-width:600px){
    .columns{grid-template-columns:repeat(2,1fr);}
  }
</style>
</head>
<body>
<header>
  <div class="brand">FPS Manager<span class="sub">EPS · Saint-Rambert-en-Bugey</span></div>
  <button class="new-btn" onclick="location.href='editeur.html'">+ Nouvelle fiche</button>
</header>

<main>
  <div id="boards"></div>
</main>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="app.js"></script>
</body>
</html>
