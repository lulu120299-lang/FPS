<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>FPS EPS</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#d9c9a8">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="stylesheet" href="carnet-theme.css">
<style>
  body{
    padding-bottom:env(safe-area-inset-bottom);
  }

  header{
    padding:calc(env(safe-area-inset-top) + 18px) 18px 14px;
    text-align:center;
    position:relative;
    background:var(--kraft);
  }

  header::after{
    content:'';
    position:absolute; bottom:0; left:10%; right:10%;
    height:2px;
    background:repeating-linear-gradient(90deg, var(--ink-soft) 0 8px, transparent 8px 14px);
    opacity:.4;
  }

  .brand{
    font-family:var(--font-stamp);
    font-size:26px;
    color:var(--ink);
    transform:rotate(-1deg);
    display:inline-block;
  }

  .brand .sub{
    display:block;
    font-family:var(--font-mono);
    font-size:10.5px;
    letter-spacing:.1em;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin-top:2px;
  }

  .new-btn{
    margin-top:12px;
    display:inline-flex;
    align-items:center;
    gap:6px;
    background:var(--card);
    border:2px solid var(--ink);
    color:var(--ink);
    font-family:var(--font-hand);
    font-weight:700;
    font-size:14px;
    padding:7px 16px;
    border-radius:3px;
    transform:rotate(-0.5deg);
    box-shadow:2px 2px 0 var(--ink);
    cursor:pointer;
  }

  .new-btn:active{
    transform:translate(1px,1px) rotate(-0.5deg);
    box-shadow:1px 1px 0 var(--ink);
  }

  main{
    max-width:1400px;
    margin:0 auto;
    padding:14px 14px 30px;
  }

  /* =========================
     🧠 CENTRAGE GLOBAL DES TABLEAUX
     ========================= */

  #boards{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:32px;
  }

  .level-board{
    width:100%;
    max-width:1200px;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  .level-head{
    display:flex;
    align-items:baseline;
    gap:10px;
    margin-bottom:10px;
    justify-content:center;
  }

  .level-head h2{
    font-family:var(--font-stamp);
    font-size:19px;
    color:var(--ink);
    margin:0;
    transform:rotate(-0.6deg);
  }

  .level-head .count{
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--ink-soft);
  }

  /* =========================
     📦 COLONNES CENTRÉES
     ========================= */

  .columns{
    display:flex;
    justify-content:center;
    gap:14px;
    flex-wrap:wrap;
    width:100%;
    padding-bottom:6px;
  }

  .column{
    flex:0 0 220px;   /* ⬅️ plus large */
    background:rgba(255,253,246,.5);
    border:1.5px solid var(--line);
    border-radius:6px;
    display:flex;
    flex-direction:column;
    min-height:90px;
  }

  .column.dragover{
    background:rgba(74,107,74,.12);
    border-color:var(--stamp-green);
  }

  .column-head{
    padding:8px 10px;
    border-bottom:1.5px solid var(--line);
    font-family:var(--font-mono);
    font-size:11px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:.04em;
    color:var(--ink-soft);
    display:flex;
    justify-content:space-between;
    align-items:center;
  }

  .column-body{
    padding:10px;
    display:flex;
    flex-direction:column;
    gap:10px;
  }

  /* =========================
     🃏 CARTES PLUS GROSSES
     ========================= */

  .card{
    background:var(--card);
    border:2px solid var(--ink);
    border-radius:6px;
    padding:14px 14px;   /* ⬅️ plus d’air */
    position:relative;
    box-shadow:2px 3px 0 rgba(58,47,31,.22);
    cursor:grab;
    user-select:none;
  }

  .card.dragging{opacity:.35;}

  .card-top{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:8px;
  }

  .card-icon{
    width:38px;   /* ⬅️ plus grand */
    height:38px;
    border:1.5px solid var(--ink);
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:18px;
    background:#fff;
  }

  .card-title{
    font-family:var(--font-stamp);
    font-size:15px;   /* ⬅️ plus lisible */
    line-height:1.2;
    overflow:hidden;
    text-overflow:ellipsis;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
  }

  .card-meta{
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--ink-soft);
    margin-bottom:8px;
  }

  .pegs{
    display:flex;
    gap:4px;
  }

  .peg{
    width:11px;
    height:11px;
    border-radius:50%;
    border:1px solid var(--ink);
  }

  .card-actions{
    position:absolute;
    top:6px;
    right:6px;
    display:flex;
    gap:2px;
  }

  .card-actions button{
    background:none;
    border:none;
    font-size:13px;
    color:var(--ink-soft);
    cursor:pointer;
    width:22px;
    height:22px;
  }

  .card-actions button:active{
    color:var(--stamp-red);
  }

  .empty-note{
    text-align:center;
    padding:40px 20px;
    font-family:var(--font-stamp);
    color:var(--ink-soft);
    font-size:15px;
  }

  .empty-note p{
    font-family:var(--font-hand);
    font-size:13px;
    margin-top:8px;
  }

  @media (max-width:600px){
    .column{
      flex:0 0 220px;
    }
  }
</style>
</head>
<body>
<header>
  <div class="brand">Mon carnet de FPS<span class="sub">EPS · PROF DE LYON</span></div>
  <br>
  <button class="new-btn" onclick="location.href='editeur.html'">✏️ Nouvelle fiche</button>
</header>

<main>
  <div id="boards"></div>
</main>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="app.js"></script>
</body>
</html>
