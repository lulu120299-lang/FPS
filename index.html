<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FPS Manager</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2b3535">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
  :root{
    --ink:#2b3535;
    --slate:#3a4a4a;
    --slate-light:#5a6e6e;
    --sage:#8aa399;
    --sage-pale:#eef2ee;
    --paper:#eceae4;
    --paper-card:#ffffff;
    --corail:#e0654a;
    --corail-soft:#f7ddd5;
    --line:#c7ccc3;
    --line-soft:#dee1da;
    --font-display:'Fjalla One','Arial Narrow',sans-serif;
    --font-body:-apple-system,'Inter',system-ui,sans-serif;
    --font-mono:'JetBrains Mono','SF Mono',monospace;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{
    margin:0;
    font-family:var(--font-body);
    background:var(--paper);
    color:var(--ink);
    min-height:100vh;
    padding-bottom:env(safe-area-inset-bottom);
  }
  header{
    position:sticky; top:0; z-index:10;
    background:var(--slate);
    color:#fff;
    padding:calc(env(safe-area-inset-top) + 14px) 16px 12px;
    display:flex; align-items:center; justify-content:space-between;
    border-bottom:3px solid var(--corail);
  }
  .brand{
    font-family:var(--font-display);
    font-size:21px;
    letter-spacing:.04em;
    text-transform:uppercase;
    display:flex; align-items:center; gap:8px;
  }
  .brand .dot{width:9px;height:9px;background:var(--corail);}
  .btn-new{
    background:var(--corail);
    color:#fff;
    border:none;
    padding:9px 14px;
    font-size:13px;
    font-weight:700;
    font-family:var(--font-body);
    letter-spacing:.02em;
    cursor:pointer;
  }
  .btn-new:active{transform:translateY(1px);}

  main{padding:14px;max-width:900px;margin:0 auto;}

  .filters{
    display:flex; gap:0; overflow-x:auto; margin-bottom:14px;
    border:1px solid var(--line); width:fit-content;
    -ms-overflow-style:none; scrollbar-width:none;
  }
  .filters::-webkit-scrollbar{display:none;}
  .chip{
    flex:none;
    font-family:var(--font-mono);
    font-size:11.5px; letter-spacing:.03em;
    padding:8px 14px;
    background:var(--paper-card);
    color:var(--slate-light);
    cursor:pointer;
    text-transform:uppercase;
    border-right:1px solid var(--line);
  }
  .chip:last-child{border-right:none;}
  .chip.active{
    background:var(--slate);
    color:#fff;
  }

  .empty{
    text-align:center;
    padding:60px 20px;
    color:var(--slate-light);
    border:1px dashed var(--line);
    background:var(--paper-card);
  }
  .empty .sym{
    font-family:var(--font-display);
    font-size:48px;
    color:var(--sage);
    margin-bottom:6px;
    line-height:1;
  }
  .empty h2{
    font-family:var(--font-display);
    text-transform:uppercase;
    letter-spacing:.05em;
    font-size:16px;
    color:var(--ink);
    margin:0 0 6px;
  }
  .empty p{margin:0;font-size:13px;line-height:1.5;}

  /* ---- Table-like list ---- */
  .fps-table{
    border:1px solid var(--line);
    background:var(--paper-card);
  }
  .fps-table-head{
    display:flex;
    background:var(--sage-pale);
    border-bottom:1px solid var(--line);
    font-family:var(--font-mono);
    font-size:10.5px;
    text-transform:uppercase;
    letter-spacing:.04em;
    color:var(--slate-light);
  }
  .fps-table-head > div{padding:8px 12px;}
  .col-titre{flex:1;}
  .col-niveau{width:120px; flex:none;}
  .col-niveaux{width:100px; flex:none; text-align:center;}
  .col-actions{width:48px; flex:none;}

  .fps-row{
    display:flex; align-items:stretch;
    border-bottom:1px solid var(--line-soft);
    cursor:pointer;
    position:relative;
  }
  .fps-row:last-child{border-bottom:none;}
  .fps-row:active{background:var(--sage-pale);}
  .fps-row::before{
    content:''; width:4px; flex:none; background:var(--apsa-color, var(--sage));
  }
  .fps-row .col-titre{
    flex:1; padding:11px 12px; min-width:0;
  }
  .fps-row .ftitle{
    font-weight:700; font-size:14px; margin:0 0 2px;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .fps-row .fapsa{
    font-family:var(--font-mono); font-size:10.5px; color:var(--slate-light);
    text-transform:uppercase; letter-spacing:.03em;
  }
  .fps-row .col-niveau{
    width:120px; flex:none; padding:11px 12px;
    font-size:12px; color:var(--slate-light);
    display:flex; align-items:center;
    border-left:1px solid var(--line-soft);
  }
  .fps-row .col-niveaux{
    width:100px; flex:none; padding:11px 8px;
    display:flex; align-items:center; justify-content:center; gap:3px;
    border-left:1px solid var(--line-soft);
  }
  .lvl-dot{width:7px;height:7px;border-radius:50%;}
  .fps-row .col-actions{
    width:48px; flex:none;
    display:flex; align-items:center; justify-content:center;
    border-left:1px solid var(--line-soft);
  }
  .del-btn{
    background:none; border:none; color:var(--slate-light);
    font-size:16px; width:32px; height:32px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }
  .del-btn:active{color:var(--corail);}

  @media (max-width:600px){
    .col-niveau{display:none;}
    .fps-table-head .col-niveau{display:none;}
  }
</style>
</head>
<body>
<header>
  <div class="brand"><span class="dot"></span>FPS Manager</div>
  <button class="btn-new" onclick="location.href='editeur.html'">+ Nouvelle FPS</button>
</header>

<main>
  <div class="filters" id="filters">
    <div class="chip active" data-filter="all">Toutes</div>
    <div class="chip" data-filter="cap">CAP</div>
    <div class="chip" data-filter="bacpro">Bac Pro</div>
    <div class="chip" data-filter="seconde">Seconde</div>
    <div class="chip" data-filter="archive">Archivées</div>
  </div>

  <div id="content">
    <div class="empty">
      <div class="sym">FPS</div>
      <h2>Aucune fiche pour l'instant</h2>
      <p>Crée ta première FPS : modalités, niveaux de compétence,<br>schémas et PDF associés.</p>
    </div>
  </div>
</main>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="app.js"></script>
</body>
</html>
