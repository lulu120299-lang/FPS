<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FPS Manager</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#d9c9a8">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="stylesheet" href="carnet-theme.css">
<style>
  body{padding-bottom:env(safe-area-inset-bottom);}
  header{
    padding:calc(env(safe-area-inset-top) + 22px) 20px 18px;
    text-align:center;
    position:relative;
    background:var(--kraft);
  }
  header::after{
    content:'';
    position:absolute; bottom:0; left:10%; right:10%;
    height:2px; background:repeating-linear-gradient(90deg, var(--ink-soft) 0 8px, transparent 8px 14px);
    opacity:.4;
  }
  .brand{
    font-family:var(--font-stamp);
    font-size:30px;
    color:var(--ink);
    transform:rotate(-1deg);
    display:inline-block;
  }
  .brand .sub{
    display:block;
    font-family:var(--font-mono);
    font-size:11px;
    letter-spacing:.1em;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin-top:2px;
    transform:rotate(0deg);
  }
  .new-btn{
    margin-top:14px;
    display:inline-flex; align-items:center; gap:6px;
    background:var(--card);
    border:2px solid var(--ink);
    color:var(--ink);
    font-family:var(--font-hand); font-weight:700; font-size:15px;
    padding:8px 18px;
    border-radius:3px;
    transform:rotate(-0.5deg);
    box-shadow:2px 2px 0 var(--ink);
    cursor:pointer;
  }
  .new-btn:active{transform:translate(1px,1px) rotate(-0.5deg); box-shadow:1px 1px 0 var(--ink);}

  main{max-width:520px; margin:0 auto; padding:10px 16px 30px;}

  .tabs{
    display:flex; gap:8px; overflow-x:auto; padding:6px 0 18px;
    justify-content:center;
    -ms-overflow-style:none; scrollbar-width:none;
  }
  .tabs::-webkit-scrollbar{display:none;}
  .tab{
    flex:none;
    font-family:var(--font-mono);
    font-size:10.5px; text-transform:uppercase; letter-spacing:.05em;
    padding:6px 12px;
    background:var(--card);
    border:1.5px solid var(--ink-soft);
    border-radius:3px;
    color:var(--ink-soft);
    white-space:nowrap;
    cursor:pointer;
  }
  .tab.active{ background:var(--ink); color:var(--card); border-color:var(--ink); }

  .card{
    background:var(--card);
    border:2px solid var(--ink);
    border-radius:4px;
    padding:16px 18px;
    margin-bottom:18px;
    position:relative;
    box-shadow:3px 4px 0 rgba(58,47,31,.25);
    cursor:pointer;
  }
  .card:nth-child(3n+1){ transform:rotate(-0.4deg); }
  .card:nth-child(3n+2){ transform:rotate(0.3deg); }
  .card:nth-child(3n+3){ transform:rotate(-0.2deg); }
  .card:active{ box-shadow:1px 2px 0 rgba(58,47,31,.25); }

  .stamp{
    position:absolute; top:-10px; right:14px;
    font-family:var(--font-stamp);
    font-size:13px;
    padding:4px 10px;
    border:2px solid currentColor;
    border-radius:3px;
    transform:rotate(6deg);
    background:var(--card);
    text-transform:uppercase;
    letter-spacing:.03em;
  }

  .card-icon{
    width:46px; height:46px;
    border:2px solid var(--ink);
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:21px;
    background:#fff;
    float:left;
    margin-right:12px;
    flex:none;
  }
  .card-title{
    font-family:var(--font-stamp);
    font-size:17px;
    margin:2px 0 4px;
    line-height:1.15;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .card-meta{
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--ink-soft);
    letter-spacing:.02em;
  }
  .clearfix{clear:both;}

  .pegs{
    display:flex; gap:5px; margin-top:10px; padding-top:10px;
    border-top:1.5px dashed var(--line);
    align-items:center;
    min-height:20px;
  }
  .peg{
    width:20px; height:20px; border-radius:50%;
    border:1.5px solid var(--ink);
    flex:none;
  }
  .pegs-empty{font-family:var(--font-mono); font-size:10px; color:var(--ink-soft);}

  .del-btn{
    position:absolute; bottom:10px; right:14px;
    background:none; border:none;
    font-family:var(--font-mono); font-size:16px; color:var(--ink-soft);
    cursor:pointer; width:30px; height:30px;
  }
  .del-btn:active{color:var(--stamp-red);}

  .empty-note{
    text-align:center; padding:50px 20px;
    font-family:var(--font-stamp);
    color:var(--ink-soft);
    font-size:16px;
    transform:rotate(-1deg);
  }
  .empty-note p{
    font-family:var(--font-hand);
    font-size:14px;
    margin-top:8px;
    transform:rotate(0deg);
  }
</style>
</head>
<body>
<header>
  <div class="brand">Mon carnet de FPS<span class="sub">EPS · Saint-Rambert-en-Bugey</span></div>
  <br>
  <button class="new-btn" onclick="location.href='editeur.html'">✏️ Nouvelle fiche</button>
</header>

<main>
  <div class="tabs" id="filters">
    <div class="tab active" data-filter="all">Toutes</div>
    <div class="tab" data-filter="cap">CAP</div>
    <div class="tab" data-filter="bacpro">Bac Pro</div>
    <div class="tab" data-filter="seconde">Seconde</div>
    <div class="tab" data-filter="archive">Archivées</div>
  </div>

  <div id="content">
    <div class="empty-note">
      ✏️ Carnet vide
      <p>Crée ta première fiche : modalités, niveaux<br>de compétence, schémas et PDF associés.</p>
    </div>
  </div>
</main>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="app.js"></script>
</body>
</html>
