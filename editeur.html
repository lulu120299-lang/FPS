<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Éditeur FPS</title>
<meta name="theme-color" content="#3a4a4a">
<style>
  :root{
    --ink:#2b3535;
    --slate:#3a4a4a;
    --slate-light:#5a6e6e;
    --sage:#8aa399;
    --sage-pale:#e7eee9;
    --paper:#f6f5f1;
    --paper-card:#ffffff;
    --corail:#e0654a;
    --corail-soft:#f7ddd5;
    --line:#dcdfd9;
    --radius:14px;
    --shadow:0 1px 2px rgba(43,53,53,.06), 0 4px 16px rgba(43,53,53,.06);
    --font-display:'Fjalla One','Arial Narrow',sans-serif;
    --font-body:-apple-system,'Inter',system-ui,sans-serif;
    --font-mono:'JetBrains Mono','SF Mono',monospace;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{
    margin:0;
    font-family:var(--font-body);
    background:var(--paper);
    color:var(--ink);
    min-height:100vh;
    padding-bottom:60px;
  }
  header{
    position:sticky; top:0; z-index:20;
    background:var(--slate);
    color:#fff;
    padding:calc(env(safe-area-inset-top) + 12px) 14px 12px;
    display:flex; align-items:center; gap:10px;
  }
  .back{
    background:none;border:none;color:#fff;font-size:22px;
    width:34px;height:34px;display:flex;align-items:center;justify-content:center;
    cursor:pointer; flex:none;
  }
  .htitle{
    font-family:var(--font-display);
    text-transform:uppercase;
    letter-spacing:.05em;
    font-size:16px;
    flex:1;
  }
  .save-status{
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--sage);
    flex:none;
  }

  main{padding:14px;max-width:780px;margin:0 auto;}

  .section{
    background:var(--paper-card);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:16px;
    margin-bottom:14px;
  }
  .section h3{
    font-family:var(--font-display);
    text-transform:uppercase;
    letter-spacing:.06em;
    font-size:13px;
    color:var(--slate-light);
    margin:0 0 12px;
    display:flex; align-items:center; justify-content:space-between;
  }

  label{
    display:block;
    font-size:12px;
    color:var(--slate-light);
    margin:0 0 4px;
    font-weight:600;
  }
  input[type=text], textarea, select{
    width:100%;
    border:1px solid var(--line);
    border-radius:10px;
    padding:10px 12px;
    font-size:15px;
    font-family:var(--font-body);
    background:var(--paper);
    color:var(--ink);
    margin-bottom:12px;
  }
  textarea{resize:vertical; min-height:70px;}
  .row{display:flex; gap:10px;}
  .row > *{flex:1;}

  /* Niveaux */
  .niveau-item{
    display:flex; align-items:center; gap:10px;
    padding:10px;
    border:1px solid var(--line);
    border-radius:10px;
    margin-bottom:8px;
    background:var(--paper);
  }
  .niveau-color{
    width:28px;height:28px;border-radius:50%;
    flex:none; border:none; cursor:pointer; padding:0;
  }
  .niveau-item input[type=text]{margin:0; flex:1;}
  .niveau-remove{
    flex:none; background:none; border:none;
    color:var(--slate-light); font-size:20px; cursor:pointer;
    width:30px;height:30px;
  }
  .btn-add{
    width:100%;
    border:1.5px dashed var(--sage);
    background:var(--sage-pale);
    color:var(--slate);
    border-radius:10px;
    padding:10px;
    font-size:14px; font-weight:600;
    cursor:pointer;
    font-family:var(--font-body);
  }

  /* Fichiers */
  .file-zone{
    border:1.5px dashed var(--line);
    border-radius:10px;
    padding:24px 14px;
    text-align:center;
    color:var(--slate-light);
    font-size:13px;
    cursor:pointer;
    margin-bottom:10px;
  }
  .file-zone:active{border-color:var(--sage);}
  .file-list{display:flex; flex-direction:column; gap:8px;}
  .file-chip{
    display:flex; align-items:center; gap:10px;
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:10px;
    padding:8px 12px;
  }
  .file-chip .ficon{
    width:32px;height:32px;border-radius:8px;
    background:var(--sage-pale);color:var(--slate);
    display:flex;align-items:center;justify-content:center;
    font-family:var(--font-mono); font-size:10px; font-weight:700;
    flex:none;
  }
  .file-chip .fname{flex:1; font-size:13px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .file-chip a, .file-chip button{
    flex:none; background:none; border:none; color:var(--slate-light);
    font-size:18px; cursor:pointer; text-decoration:none;
  }

  /* Actions bas de page */
  .actions{
    position:fixed; bottom:0; left:0; right:0;
    background:var(--paper-card);
    border-top:1px solid var(--line);
    padding:10px 14px calc(10px + env(safe-area-inset-bottom));
    display:flex; gap:10px;
    z-index:10;
  }
  .btn-primary, .btn-secondary{
    flex:1;
    border:none; border-radius:10px;
    padding:13px;
    font-size:15px; font-weight:600;
    font-family:var(--font-body);
    cursor:pointer;
  }
  .btn-primary{background:var(--corail); color:#fff;}
  .btn-secondary{background:var(--sage-pale); color:var(--slate);}

  .link-card{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px;
    background:var(--sage-pale);
    border-radius:10px;
    margin-bottom:12px;
    cursor:pointer;
    color:var(--slate);
    font-size:14px; font-weight:600;
  }
  .link-card .sub{
    display:block; font-weight:400; font-size:12px; color:var(--slate-light); margin-top:2px;
  }
</style>
</head>
<body>
<header>
  <button class="back" onclick="goBack()">‹</button>
  <div class="htitle">Éditeur FPS</div>
  <div class="save-status" id="saveStatus"></div>
</header>

<main>

  <div class="section">
    <h3>Identification</h3>
    <label for="titre">Titre de la FPS</label>
    <input type="text" id="titre" placeholder="ex. FPS Demi-fond — niveau 4">

    <div class="row">
      <div>
        <label for="apsa">APSA</label>
        <select id="apsa">
          <option value="demi-fond">Course de demi-fond</option>
          <option value="course-duree">Course en durée</option>
          <option value="course-vitesse">Course de vitesse</option>
          <option value="orientation">Course d'orientation</option>
          <option value="acrosport">Acrosport</option>
          <option value="badminton">Badminton</option>
          <option value="tennis-table">Tennis de table</option>
          <option value="volley">Volley-ball</option>
          <option value="athletisme">Athlétisme multisport</option>
          <option value="musculation">Musculation / CrossFit</option>
          <option value="default">Autre</option>
        </select>
      </div>
      <div>
        <label for="ca">Champ d'apprentissage</label>
        <select id="ca">
          <option value="">—</option>
          <option value="1">CA1</option>
          <option value="2">CA2</option>
          <option value="3">CA3</option>
          <option value="4">CA4</option>
          <option value="5">CA5</option>
        </select>
      </div>
    </div>

    <label for="niveauScolaire">Niveau / classe(s) concernées</label>
    <input type="text" id="niveauScolaire" placeholder="ex. CAP, Seconde, Bac Pro">
  </div>

  <div class="section">
    <h3>Modalités</h3>
    <label for="dispositif">Dispositif</label>
    <textarea id="dispositif" placeholder="Description du dispositif, organisation matérielle, durée…"></textarea>

    <label for="consignes">Consignes</label>
    <textarea id="consignes" placeholder="Une consigne par ligne. Commencer par « Vous devez » / « Vous allez »…"></textarea>

    <label for="criteres">Critères d'évaluation</label>
    <textarea id="criteres" placeholder="Une ligne par critère, avec valeurs chiffrées si possible."></textarea>
  </div>

  <div class="section">
    <h3>
      Niveaux de compétence
    </h3>
    <div id="niveauxList"></div>
    <button class="btn-add" onclick="addNiveau()">+ Ajouter un niveau</button>
  </div>

  <div class="section">
    <h3>Documents (PDF, schémas)</h3>
    <div class="file-zone" onclick="document.getElementById('fileInput').click()">
      Touchez pour ajouter un PDF ou une image (schéma)
    </div>
    <input type="file" id="fileInput" accept=".pdf,image/*" multiple style="display:none">
    <div class="file-list" id="fileList"></div>
  </div>

  <div class="section">
    <div class="link-card" onclick="goToSchema()">
      Créer un schéma
      <span class="sub">Ouvrir l'éditeur de schémas pour cette FPS</span>
      <span style="font-size:20px;">›</span>
    </div>
    <div class="link-card" onclick="goToGrille()">
      Grille de classe
      <span class="sub">Importer une classe et répartir les élèves par niveau</span>
      <span style="font-size:20px;">›</span>
    </div>
  </div>

</main>

<div class="actions">
  <button class="btn-secondary" onclick="duplicateFps()">Dupliquer</button>
  <button class="btn-primary" onclick="saveFps()">Enregistrer</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="editeur.js"></script>
</body>
</html>
