<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Éditeur FPS</title>
<meta name="theme-color" content="#3a4a4a">
<style>
  :root{
    --ink:#2b3535;
    --slate:#3a4a4a;
    --slate-light:#5a6e6e;
    --sage:#8aa399;
    --sage-pale:#e7eee9;
    --paper:#f6f5f1;
    --paper-card:#ffffff;
    --corail:#e0654a;
    --corail-soft:#f7ddd5;
    --line:#dcdfd9;
    --radius:14px;
    --shadow:0 1px 2px rgba(43,53,53,.06), 0 4px 16px rgba(43,53,53,.06);
    --font-display:'Fjalla One','Arial Narrow',sans-serif;
    --font-body:-apple-system,'Inter',system-ui,sans-serif;
    --font-mono:'JetBrains Mono','SF Mono',monospace;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{
    margin:0;
    font-family:var(--font-body);
    background:var(--paper);
    color:var(--ink);
    min-height:100vh;
    padding-bottom:80px;
  }
  header{
    position:sticky; top:0; z-index:30;
    background:var(--slate);
    color:#fff;
    padding:calc(env(safe-area-inset-top) + 12px) 14px 12px;
    display:flex; align-items:center; gap:10px;
  }
  .back{
    background:none;border:none;color:#fff;font-size:22px;
    width:34px;height:34px;display:flex;align-items:center;justify-content:center;
    cursor:pointer; flex:none;
  }
  .htitle{
    font-family:var(--font-display);
    text-transform:uppercase;
    letter-spacing:.05em;
    font-size:16px;
    flex:1;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .save-status{
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--sage);
    flex:none;
  }
  .header-btn{
    background:none; border:1px solid rgba(255,255,255,.3);
    color:#fff; border-radius:8px;
    font-size:12px; font-family:var(--font-mono);
    padding:6px 10px; cursor:pointer; flex:none;
  }

  main{padding:14px;max-width:820px;margin:0 auto;}

  /* En-tête identification (toujours présent, hors liste de blocs) */
  .section{
    background:var(--paper-card);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:16px;
    margin-bottom:14px;
  }
  .section h3{
    font-family:var(--font-display);
    text-transform:uppercase;
    letter-spacing:.06em;
    font-size:13px;
    color:var(--slate-light);
    margin:0 0 12px;
  }
  label{
    display:block;
    font-size:12px;
    color:var(--slate-light);
    margin:0 0 4px;
    font-weight:600;
  }
  input[type=text], textarea, select{
    width:100%;
    border:1px solid var(--line);
    border-radius:10px;
    padding:10px 12px;
    font-size:15px;
    font-family:var(--font-body);
    background:var(--paper);
    color:var(--ink);
    margin-bottom:12px;
  }
  textarea{resize:vertical; min-height:60px;}
  .row{display:flex; gap:10px;}
  .row > *{flex:1;}

  /* ---- Blocs ---- */
  .blocks{display:flex; flex-direction:column; gap:12px; margin-bottom:14px;}
  .block{
    background:var(--paper-card);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    overflow:hidden;
  }
  .block-head{
    display:flex; align-items:center; gap:8px;
    padding:10px 12px;
    background:var(--sage-pale);
    border-bottom:1px solid var(--line);
  }
  .block-head .btype{
    font-family:var(--font-mono);
    font-size:10px; letter-spacing:.06em; text-transform:uppercase;
    color:var(--slate-light);
    flex:1;
  }
  .block-head button{
    background:none; border:none; cursor:pointer;
    color:var(--slate-light); font-size:16px;
    width:28px; height:28px; flex:none;
    display:flex; align-items:center; justify-content:center;
    border-radius:6px;
  }
  .block-head button:active{background:rgba(0,0,0,.06);}
  .block-body{padding:14px;}

  /* Toolbar texte riche */
  .rt-toolbar{
    display:flex; gap:6px; flex-wrap:wrap;
    margin-bottom:8px;
  }
  .rt-toolbar button{
    border:1px solid var(--line);
    background:var(--paper);
    border-radius:8px;
    width:32px; height:32px;
    font-size:13px; cursor:pointer;
    color:var(--slate);
  }
  .rt-toolbar button.active{background:var(--slate); color:#fff; border-color:var(--slate);}
  .rt-toolbar input[type=color]{
    width:32px; height:32px; border-radius:8px; border:1px solid var(--line); padding:2px; cursor:pointer;
  }
  .rt-editable{
    border:1px solid var(--line);
    border-radius:10px;
    padding:10px 12px;
    min-height:80px;
    font-size:14px;
    line-height:1.6;
    background:var(--paper);
    outline:none;
  }
  .rt-editable:focus{border-color:var(--sage);}
  .rt-editable mark{background:#fef3a0; padding:0 1px; border-radius:2px;}

  /* Bandeau titre */
  .banner-preview{
    border-radius:10px;
    padding:14px 16px;
    color:#fff;
  }
  .banner-preview .bp-title{font-weight:700; font-size:17px; margin:0 0 4px;}
  .banner-preview .bp-sub{font-size:12px; opacity:.85;}

  /* Citation/objectif */
  .quote-box{
    border-left:4px solid var(--corail);
    background:var(--corail-soft);
    border-radius:0 10px 10px 0;
    padding:12px 14px;
    font-style:italic;
    font-size:14px;
  }

  /* AFLP grid */
  .aflp-grid{
    display:grid; gap:8px;
    grid-template-columns:repeat(auto-fit, minmax(140px,1fr));
  }
  .aflp-col{border-radius:10px; padding:10px; color:#fff;}
  .aflp-col .alabel{font-weight:700; font-size:12px; margin-bottom:4px;}
  .aflp-col textarea{
    background:rgba(255,255,255,.92); color:var(--ink);
    border:none; margin-bottom:0; font-size:13px; min-height:60px;
  }
  .aflp-col input[type=text]{
    background:rgba(255,255,255,.18); border:1px solid rgba(255,255,255,.3);
    color:#fff; margin-bottom:6px; font-size:12px; font-weight:700;
    padding:6px 8px;
  }
  .aflp-col input[type=text]::placeholder{color:rgba(255,255,255,.7);}
  .aflp-actions{display:flex; gap:8px; margin-top:10px;}
  .aflp-actions button{
    border:1px dashed var(--sage); background:var(--sage-pale); color:var(--slate);
    border-radius:8px; padding:7px 12px; font-size:12px; cursor:pointer; font-family:var(--font-body);
  }

  /* Encadré (callout) */
  .callout{
    border-radius:10px; padding:12px 14px; font-size:14px;
    border:1px solid var(--line);
  }

  /* Tableau bonus / colonnes */
  .table-cols{display:grid; gap:8px;}
  .table-col{border-radius:10px; overflow:hidden; border:1px solid var(--line);}
  .table-col .tc-head{
    padding:8px 10px; font-weight:700; font-size:12px;
  }
  .table-col textarea{margin:8px; width:calc(100% - 16px); min-height:50px; font-size:13px;}

  /* Image */
  .img-block img{width:100%; border-radius:10px; display:block;}
  .img-zone{
    border:1.5px dashed var(--line); border-radius:10px;
    padding:24px; text-align:center; color:var(--slate-light); font-size:13px; cursor:pointer;
  }

  /* Picker d'ajout de bloc */
  .add-block-zone{
    display:grid; grid-template-columns:repeat(2,1fr); gap:8px;
  }
  .add-block-btn{
    border:1.5px dashed var(--sage);
    background:var(--sage-pale);
    color:var(--slate);
    border-radius:10px;
    padding:12px 10px;
    font-size:13px; font-weight:600;
    cursor:pointer; text-align:left;
    font-family:var(--font-body);
    display:flex; flex-direction:column; gap:2px;
  }
  .add-block-btn small{font-weight:400; font-size:11px; color:var(--slate-light); font-family:var(--font-mono);}

  /* Niveaux (grille de classe) */
  .niveau-item{
    display:flex; align-items:center; gap:10px;
    padding:10px;
    border:1px solid var(--line);
    border-radius:10px;
    margin-bottom:8px;
    background:var(--paper);
  }
  .niveau-color{width:28px;height:28px;border-radius:50%; flex:none; border:none; cursor:pointer; padding:0;}
  .niveau-item input[type=text]{margin:0; flex:1;}
  .niveau-remove{flex:none; background:none; border:none; color:var(--slate-light); font-size:20px; cursor:pointer; width:30px;height:30px;}
  .btn-add{
    width:100%; border:1.5px dashed var(--sage); background:var(--sage-pale); color:var(--slate);
    border-radius:10px; padding:10px; font-size:14px; font-weight:600; cursor:pointer; font-family:var(--font-body);
  }

  .link-card{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px; background:var(--sage-pale); border-radius:10px; margin-bottom:12px;
    cursor:pointer; color:var(--slate); font-size:14px; font-weight:600;
  }
  .link-card .sub{display:block; font-weight:400; font-size:12px; color:var(--slate-light); margin-top:2px;}

  /* Actions bas de page */
  .actions{
    position:fixed; bottom:0; left:0; right:0;
    background:var(--paper-card);
    border-top:1px solid var(--line);
    padding:10px 14px calc(10px + env(safe-area-inset-bottom));
    display:flex; gap:10px;
    z-index:10;
  }
  .btn-primary, .btn-secondary{
    flex:1; border:none; border-radius:10px; padding:13px;
    font-size:15px; font-weight:600; font-family:var(--font-body); cursor:pointer;
  }
  .btn-primary{background:var(--corail); color:#fff;}
  .btn-secondary{background:var(--sage-pale); color:var(--slate);}
</style>
</head>
<body>
<header>
  <button class="back" onclick="goBack()">‹</button>
  <div class="htitle">Éditeur FPS</div>
  <button class="header-btn" onclick="openPrint()">PDF</button>
  <div class="save-status" id="saveStatus"></div>
</header>

<main>

  <div class="section">
    <h3>Identification</h3>
    <label for="titre">Titre de la FPS</label>
    <input type="text" id="titre" placeholder="ex. FPS · Course d'orientation">

    <label for="sousTitre">Sous-titre / contexte</label>
    <input type="text" id="sousTitre" placeholder="ex. EPS · CAP lycée professionnel · Champ d'apprentissage n°2 · CAP EPC 1">

    <div class="row">
      <div>
        <label for="apsa">APSA</label>
        <select id="apsa">
          <option value="demi-fond">Course de demi-fond</option>
          <option value="course-duree">Course en durée</option>
          <option value="course-vitesse">Course de vitesse</option>
          <option value="orientation">Course d'orientation</option>
          <option value="acrosport">Acrosport</option>
          <option value="badminton">Badminton</option>
          <option value="tennis-table">Tennis de table</option>
          <option value="volley">Volley-ball</option>
          <option value="athletisme">Athlétisme multisport</option>
          <option value="musculation">Musculation / CrossFit</option>
          <option value="default">Autre</option>
        </select>
      </div>
      <div>
        <label for="ca">Champ d'apprentissage</label>
        <select id="ca">
          <option value="">—</option>
          <option value="1">CA1</option>
          <option value="2">CA2</option>
          <option value="3">CA3</option>
          <option value="4">CA4</option>
          <option value="5">CA5</option>
        </select>
      </div>
    </div>

    <label for="niveauScolaire">Niveau / classe(s) concernées</label>
    <input type="text" id="niveauScolaire" placeholder="ex. CAP, Seconde, Bac Pro">
  </div>

  <!-- Liste des blocs de contenu -->
  <div class="blocks" id="blocksList"></div>

  <div class="section">
    <h3>Ajouter un bloc</h3>
    <div class="add-block-zone">
      <button class="add-block-btn" onclick="addBlock('bandeau')">Bandeau titre<small>Titre coloré + sous-titre</small></button>
      <button class="add-block-btn" onclick="addBlock('objectif')">Objectif / citation<small>Encadré italique</small></button>
      <button class="add-block-btn" onclick="addBlock('aflp')">Colonnes AFLP<small>Compétences travaillées</small></button>
      <button class="add-block-btn" onclick="addBlock('texte')">Texte riche<small>Dispositif, consignes…</small></button>
      <button class="add-block-btn" onclick="addBlock('encadre')">Encadré / règle<small>Information mise en valeur</small></button>
      <button class="add-block-btn" onclick="addBlock('tableau')">Colonnes comparatives<small>Bonus offensif/défensif…</small></button>
      <button class="add-block-btn" onclick="addBlock('securite')">Sécurité<small>Encadré rouge dédié</small></button>
      <button class="add-block-btn" onclick="addBlock('image')">Image / schéma<small>Photo ou capture</small></button>
    </div>
  </div>

  <div class="section">
    <h3>Niveaux de compétence (grille de classe)</h3>
    <div id="niveauxList"></div>
    <button class="btn-add" onclick="addNiveau()">+ Ajouter un niveau</button>
  </div>

  <div class="section">
    <div class="link-card" onclick="goToSchema()">
      Créer un schéma
      <span class="sub">Ouvrir l'éditeur de schémas pour cette FPS</span>
      <span style="font-size:20px;">›</span>
    </div>
    <div class="link-card" onclick="goToGrille()">
      Grille de classe
      <span class="sub">Importer une classe et répartir les élèves par niveau</span>
      <span style="font-size:20px;">›</span>
    </div>
  </div>

</main>

<div class="actions">
  <button class="btn-secondary" onclick="duplicateFps()">Dupliquer</button>
  <button class="btn-primary" onclick="saveFps()">Enregistrer</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="editeur.js"></script>
</body>
</html>
